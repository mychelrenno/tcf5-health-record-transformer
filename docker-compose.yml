services:
  postgres:
    image: postgres:15-alpine
    container_name: tcf5-postgres
    environment:
      POSTGRES_USER: sus_admin
      POSTGRES_PASSWORD: sus_password
      POSTGRES_DB: sus_interop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8083:8083"   # host:container aligned with application.yaml server.port: 8083
    environment:
      - DB_HOST=postgres
      - DB_NAME=sus_interop
      - DB_USER=sus_admin
      - DB_PASS=sus_password
      - SERVER_ADDRESS=0.0.0.0
      - SERVER_PORT=8083
      - KAFKA_BOOTSTRAP_SERVERS=host.docker.internal:29092
    depends_on:
      - postgres
    restart: unless-stopped
volumes:
  postgres_data:

